<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="记录 C#、Unity、网络编程、设计模式与工程实践的学习和总结。">
    <meta name="keywords" content="C#, Unity, 网络编程, 设计模式, 个人博客">
    <meta name="author" content="wangl">
    <meta property="og:title" content="开发日志">
    <meta property="og:description" content="记录 C#、Unity、网络编程、设计模式与工程实践的学习和总结。">
    <meta property="og:type" content="website">
    <title>开发日志</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="alternate" type="application/rss+xml" title="开发日志 RSS" href="rss.xml">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        window.__resourceLoadErrors = [];

        function registerResourceLoadError(resourceName) {
            window.__resourceLoadErrors.push(resourceName);
        }
    </script>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js" onerror="registerResourceLoadError('Vue')"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js" onerror="registerResourceLoadError('Vue Router')"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" onerror="registerResourceLoadError('marked')"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"
        onerror="registerResourceLoadError('Highlight.js 样式')">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"
        onerror="registerResourceLoadError('Highlight.js')"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/csharp.min.js"
        onerror="registerResourceLoadError('C# 语言高亮')"></script>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/list.css">
    <link rel="stylesheet" href="css/article.css">
</head>

<body>
    <noscript>
        <div class="runtime-fallback">
            该博客需要启用 JavaScript 才能正常浏览。
        </div>
    </noscript>

    <div id="runtime-error-banner" class="runtime-fallback" hidden></div>

    <div id="app">
        <header class="header">
            <div class="container">
                <div class="header-main">
                    <router-link to="/" class="logo">
                        <h1>{{ siteMeta.title }}</h1>
                    </router-link>
                    <div class="header-actions">
                        <search-box></search-box>
                        <nav class="nav">
                            <ul>
                                <li><router-link :to="{ name: 'archive' }">归档</router-link></li>
                                <li><router-link :to="{ name: 'tags' }">标签</router-link></li>
                                <li><router-link :to="{ name: 'series' }">系列</router-link></li>
                                <li><router-link :to="{ name: 'about' }">关于</router-link></li>
                                <li><a href="rss.xml" target="_blank" rel="noopener noreferrer">RSS</a></li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>

            <div class="header-breadcrumb" v-if="showBreadcrumb">
                <div class="container">
                    <Breadcrumb :category-name="currentCategory" :article-title="currentArticle" />
                </div>
            </div>
        </header>

        <main class="main">
            <div class="container">
                <router-view v-slot="{ Component, route }">
                    <transition name="fade" mode="out-in">
                        <div :key="route.fullPath" class="route-view-shell">
                            <component :is="Component" />
                        </div>
                    </transition>
                </router-view>
            </div>
        </main>

        <footer class="footer">
            <div class="container footer-inner">
                <div>
                    <p class="footer-title">{{ siteMeta.title }}</p>
                    <p class="footer-text">{{ siteMeta.description }}</p>
                </div>
                <div class="footer-links">
                    <router-link :to="{ name: 'archive' }">归档</router-link>
                    <router-link :to="{ name: 'tags' }">标签</router-link>
                    <router-link :to="{ name: 'series' }">系列</router-link>
                    <router-link :to="{ name: 'about' }">关于我</router-link>
                </div>
                <p class="footer-copy">&copy; {{ currentYear }} {{ siteMeta.author }}</p>
            </div>
        </footer>
    </div>

    <script type="module" src="js/app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const banner = document.getElementById('runtime-error-banner');
            const hasRuntimeDependencyError = window.__resourceLoadErrors.length > 0 || !window.Vue || !window.VueRouter || !window.marked;

            if (!banner || !hasRuntimeDependencyError) {
                return;
            }

            banner.hidden = false;
            banner.innerText = `页面关键资源加载失败：${window.__resourceLoadErrors.join('、') || '运行时依赖缺失'}。请稍后刷新页面或检查网络/CDN 状态。`;
        });
    </script>
</body>

</html>
